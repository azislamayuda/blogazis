<style>
.loader,.loader:before,.loader:after{border-radius:50%;width:2.5em;height:2.5em;animation-fill-mode:both;animation:bblFadInOut 1.8s infinite ease-in-out;}
.loader{color:var(--primary-color-dark);font-size:7px;position:relative;text-indent:-9999em;transform:translateZ(0);animation-delay:-0.16s;margin:100px auto;}
.loader:before,.loader:after{content:'';position:absolute;top:0;}
.loader:before{left:-3.5em;animation-delay:-0.32s;}
.loader:after{left:3.5em;}
@keyframes bblFadInOut{0%,80%,100%{box-shadow:0 2.5em 0 -1.3em;}40%{box-shadow:0 2.5em 0 0;}}
</style>
<div class="container-md">
<div class="lmyd-title">
<h1>Table of Contents</h1>
<span id="toc-note" class="toc-note"></span>
</div>
<div id="lamayuda_toc">
<div class="loader"></div>
</div>
</div>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const tocDiv = document.getElementById("lamayuda_toc");
  const tocNoteDiv = document.getElementById("toc-note");
  const loader = document.querySelector(".loader");
  
  if (loader) loader.style.display = "block";

  let allPosts = [];
  const state = {
    search: "",
    category: "all",
    sortBy: "a_to_z"
  };

  // 1. Fetch seluruh artikel melalui standar modern fetch (alt=json) dengan paginasi
  const fetchAllPosts = async () => {
    let startIndex = 1;
    const maxResults = 500;
    let totalPosts = 0;

    try {
      do {
        const response = await fetch(`/feeds/posts/summary?start-index=${startIndex}&max-results=${maxResults}&alt=json`);
        if (!response.ok) throw new Error("Network response was not ok");
        const data = await response.json();
        const feed = data.feed;

        if (!feed || !feed.entry) break;

        totalPosts = Number(feed.openSearch$totalResults?.$t || 0);

        feed.entry.forEach((entry, idx) => {
          const title = entry.title?.$t || "Untitled";
          const altLink = entry.link?.find(l => l.rel === "alternate");
          const url = altLink ? altLink.href : "#";
          const categories = entry.category ? entry.category.map(c => c.term) : [];

          allPosts.push({
            id: startIndex + idx,
            title,
            url,
            categories
          });
        });

        startIndex += feed.entry.length;
      } while (allPosts.length < totalPosts);

      if (loader) loader.style.display = "none";
      initTocUI();
    } catch (error) {
      console.error("Gagal memuat Table of Contents:", error);
      if (loader) loader.style.display = "none";
      if (tocDiv) {
        tocDiv.innerHTML = `<div class="alert alert-danger text-center my-4">
          Gagal memuat daftar artikel. Silakan periksa koneksi atau muat ulang halaman.
        </div>`;
      }
    }
  };

  // 2. Inisialisasi UI Kontrol (Search, Category, Sort, Reset)
  const initTocUI = () => {
    if (!tocDiv) return;

    // Ambil daftar kategori unik yang diurutkan abjad
    const categoriesSet = new Set();
    allPosts.forEach(post => post.categories.forEach(cat => categoriesSet.add(cat)));
    const sortedCategories = Array.from(categoriesSet).sort((a, b) => a.localeCompare(b));

    tocDiv.innerHTML = `
      <div class="row g-3 align-items-end mb-4">
        <div class="col-12 col-md-4">
          <label for="search_input" class="form-label fw-medium">Search</label>
          <input type="text" id="search_input" class="form-control" placeholder="Cari judul artikel...">
        </div>
        <div class="col-12 col-sm-6 col-md-3">
          <label for="sort_labels" class="form-label fw-medium">Category</label>
          <select id="sort_labels" class="form-select">
            <option value="all">All (${allPosts.length})</option>
            ${sortedCategories.map(cat => `<option value="${escapeHtml(cat)}">${escapeHtml(cat)}</option>`).join("")}
          </select>
        </div>
        <div class="col-12 col-sm-6 col-md-3">
          <label for="sort_by" class="form-label fw-medium">Sort By</label>
          <select id="sort_by" class="form-select">
            <option value="a_to_z">A to Z</option>
            <option value="z_to_a">Z to A</option>
            <option value="oldest">Oldest First</option>
            <option value="newest">Newest First</option>
          </select>
        </div>
        <div class="col-12 col-md-2 d-grid">
          <button id="reset_filters" class="btn btn-secondary">Reset</button>
        </div>
      </div>
      <ol id="sitemap_list" class="list-group list-group-flush"></ol>
      <style>
        .list-number { margin-right: .5em; font-weight: 500; }
        .toc-badge { font-size: 0.75em; }
      </style>
    `;

    // Pasang Event Listeners
    const searchInput = document.getElementById("search_input");
    const sortLabels = document.getElementById("sort_labels");
    const sortBy = document.getElementById("sort_by");
    const resetBtn = document.getElementById("reset_filters");

    searchInput?.addEventListener("input", e => {
      state.search = e.target.value.trim().toLowerCase();
      render();
    });

    sortLabels?.addEventListener("change", e => {
      state.category = e.target.value;
      render();
    });

    sortBy?.addEventListener("change", e => {
      state.sortBy = e.target.value;
      render();
    });

    resetBtn?.addEventListener("click", () => {
      state.search = "";
      state.category = "all";
      state.sortBy = "a_to_z";
      if (searchInput) searchInput.value = "";
      if (sortLabels) sortLabels.value = "all";
      if (sortBy) sortBy.value = "a_to_z";
      render();
    });

    // Render pertama kali
    render();
  };

  // 3. Mesin Render berbasis State super cepat (O(1) DOM update)
  const render = () => {
    const sitemapList = document.getElementById("sitemap_list");
    if (!sitemapList) return;

    // Filter by search & category
    let filtered = allPosts.filter(post => {
      const matchSearch = !state.search || post.title.toLowerCase().includes(state.search);
      const matchCategory = state.category === "all" || post.categories.includes(state.category);
      return matchSearch && matchCategory;
    });

    // Sort in memory
    filtered.sort((a, b) => {
      if (state.sortBy === "a_to_z") return a.title.localeCompare(b.title);
      if (state.sortBy === "z_to_a") return b.title.localeCompare(a.title);
      if (state.sortBy === "newest") return b.id - a.id;
      if (state.sortBy === "oldest") return a.id - b.id;
      return 0;
    });

    // Update Note Di Atas
    if (tocNoteDiv) {
      if (state.category === "all" && !state.search) {
        tocNoteDiv.innerHTML = `Displaying all <strong>${filtered.length}</strong> posts<br/>`;
      } else {
        const catInfo = state.category !== "all" ? ` - label #<strong>${escapeHtml(state.category)}</strong>` : "";
        const searchInfo = state.search ? ` matching "<strong>${escapeHtml(state.search)}</strong>"` : "";
        tocNoteDiv.innerHTML = `Displaying <strong>${filtered.length}</strong> post${filtered.length !== 1 ? "s" : ""}${catInfo}${searchInfo}<br/>`;
      }
    }

    // Render HTML List
    if (filtered.length === 0) {
      sitemapList.innerHTML = `<li class="list-group-item text-center py-4 text-muted">Tidak ada artikel yang sesuai kriteria pencarian Anda.</li>`;
      return;
    }

    sitemapList.innerHTML = filtered.map((post, idx) => `
      <li class="list-group-item d-flex flex-wrap justify-content-between align-items-center gap-2 py-2">
        <div>
          <span class="list-number">${idx + 1}.</span>
          <a href="${post.url}" target="_blank" rel="noopener noreferrer" class="text-decoration-none fw-medium">${escapeHtml(post.title)}</a>
        </div>
        ${post.categories.length ? `<div class="d-flex flex-wrap gap-1">${post.categories.slice(0, 3).map(cat => `<span class="badge bg-body-secondary text-body-secondary border toc-badge">${escapeHtml(cat)}</span>`).join("")}</div>` : ""}
      </li>
    `).join("");
  };

  const escapeHtml = str => String(str || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");

  fetchAllPosts();
});
</script>
